apiVersion: apps/v1
kind: Deployment
metadata:
  name: workflow-frontend
  namespace: workflow-dashboard
  labels:
    app: workflow-frontend
spec:
  replicas: 1
  progressDeadlineSeconds: 900
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: workflow-frontend
  template:
    metadata:
      labels:
        app: workflow-frontend
    spec:
      terminationGracePeriodSeconds: 30
      imagePullSecrets:
        - name: acr-pull-secret
      containers:
        - name: frontend
          image: ACR_REGISTRY/workflow-frontend2:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "http://workflow-backend:8000"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 45
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 60
            periodSeconds: 20
            failureThreshold: 5
---
apiVersion: v1
kind: Service
metadata:
  name: workflow-frontend
  namespace: workflow-dashboard
  labels:
    app: workflow-frontend
spec:
  type: LoadBalancer
  ports:
    - port: 80
      targetPort: 3000
      protocol: TCP
      name: http
  selector:
    app: workflow-frontend
